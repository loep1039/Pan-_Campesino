<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pan Campesino Pro - Estructura de Costos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #fefaf6; -webkit-tap-highlight-color: transparent; }
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(249, 115, 22, 0.1); }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
        .no-wrap { white-space: nowrap; }
    </style>
</head>
<body class="p-2 md:p-6 font-sans text-gray-800">
    <div class="max-w-md mx-auto">
        
        <div class="bg-gradient-to-r from-gray-800 to-gray-700 rounded-t-xl p-4 text-white shadow-lg flex justify-between items-center">
            <div class="text-left">
                <h1 class="text-2xl font-extrabold uppercase tracking-tight">Pan Campesino</h1>
                <p class="text-gray-200 text-[10px] font-medium tracking-widest uppercase italic">Gestión de Fernando Araujo</p>
            </div>
            <button onclick="verificarAcceso()" class="bg-white/10 p-2 rounded-full hover:bg-white/20 transition-all border border-white/30">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
            </button>
        </div>

        <div class="bg-white rounded-b-xl card-shadow border border-gray-100 p-3">
            
            <div id="settings-panel" class="hidden bg-gray-50 p-4 rounded-xl border-2 border-dashed border-gray-200 mb-4 animate-pulse-once">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Base de Costos por Gramo ($)</h3>
                    <button onclick="cerrarAjustes()" class="text-red-500 text-[10px] font-bold uppercase">Cerrar</button>
                </div>
                <div id="prices-editor" class="grid grid-cols-1 gap-2 mb-4">
                    </div>
                <button onclick="savePrices()" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-lg text-xs shadow-md transition-all">GUARDAR CAMBIOS EN COSTOS</button>
            </div>

            <section class="bg-gray-50 p-3 rounded-lg border border-gray-100 mb-4">
                <div class="flex items-center gap-4">
                    <div class="flex-1">
                        <label class="text-[9px] font-bold text-gray-500 uppercase tracking-wider block mb-1">Cantidad de Panes a Elaborar</label>
                        <input type="number" id="cantidadPanes" value="1" min="1" step="1" oninput="calcular()" class="w-full bg-white p-3 rounded-lg border border-gray-200 outline-none text-2xl font-black shadow-inner focus:border-gray-800 text-center">
                    </div>
                    <div class="w-1/3 text-center border-l border-gray-100 pl-4">
                        <span class="text-[8px] font-bold text-gray-400 uppercase block mb-1 no-wrap">Masa por Pan Base</span>
                        <span class="text-lg font-bold text-gray-700 italic">402,5 g</span>
                    </div>
                </div>
            </section>

            <div class="overflow-x-auto">
                <table class="w-full table-auto">
                    <thead>
                        <tr class="text-gray-400 text-[10px] uppercase border-b border-gray-100 tracking-tighter">
                            <th class="px-1 py-2 text-left">Ingrediente</th>
                            <th class="px-1 py-2 text-right">Peso (g)</th>
                            <th class="px-1 py-2 text-right">Costo ($)</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-body" class="divide-y divide-gray-50 text-[13px]">
                        </tbody>
                    <tfoot class="border-t-2 border-gray-100">
                        <tr class="bg-gray-50 text-gray-600">
                            <td class="px-2 py-2 font-bold text-[10px] uppercase">Masa Total a Preparar</td>
                            <td id="total-gramos" colspan="2" class="px-2 py-2 text-right font-black text-lg italic text-gray-800 no-wrap">0 g</td>
                        </tr>
                        <tr class="bg-gray-800 text-white shadow-inner">
                            <td class="px-2 py-3 font-bold text-[11px] rounded-l-lg uppercase tracking-tight">Costo Total Insumos ($)</td>
                            <td id="total-costo" colspan="2" class="px-2 py-3 text-right font-black text-xl rounded-r-lg">$0,00</td>
                        </tr>
                    </tfoot>
                </table>
            </div>

            <button onclick="copyToClipboard()" class="mt-4 w-full bg-gray-600 hover:bg-gray-700 text-white font-bold py-3 rounded-lg text-xs shadow-md active:scale-95 transition-all flex items-center justify-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3" /></svg>
                COPIAR RECETA Y COSTO PARA WHATSAPP
            </button>
        </div>
    </div>

    <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-black/90 text-white px-6 py-2 rounded-full text-[10px] font-bold opacity-0 transition-opacity pointer-events-none z-50"></div>

    <script>
        // ==========================================
        // 1. CONFIGURACIÓN TÉCNICA
        // ==========================================
        const CLAVE_MAESTRA = "1506"; // Clave administrativo basada en la imagen
        const LOCALE = 'es-VE'; // Configuración para Venezuela (Punto miles, coma decimal)
        
        // Peso base de masa para UN solo pan (de tu imagen 3)
        const MASA_PAN_ESTANDAR = 402.5; 

        // Costos base por gramo (calculados de tus imágenes)
        const preciosBase = {
            "Harina": 0.0012608,   // $0,290 / 230g
            "Agua": 0,             // $0,000 / 125,35g
            "Levadura": 0.012532,  // $0,049 / 3,91g
            "Sal": 0.005217,       // $0,024 / 4,6g
            "Azúcar": 0.00038,     // $0,007 / 18,4g
            "Margarina": 0.001576, // $0,029 / 18,4g
            "Vainilla": 0.002174   // $0,004 / 1,84g
        };

        // Estructura de la receta basada en Harina = 100% (Baker's Percentages)
        const recetaBase = [
            { nombre: "Harina", porcentaje: 100.0 },
            { nombre: "Agua", porcentaje: 54.5 },
            { nombre: "Levadura", porcentaje: 1.7 },
            { nombre: "Sal", porcentaje: 2.0 },
            { nombre: "Azúcar", porcentaje: 8.0 },
            { nombre: "Margarina", porcentaje: 8.0 },
            { nombre: "Vainilla", porcentaje: 0.8 }
        ];

        let preciosActuales = {};

        // FORMATEADORES REGIONALES
        const fmtPeso = new Intl.NumberFormat(LOCALE, { maximumFractionDigits: 0 });
        const fmtCosto = new Intl.NumberFormat(LOCALE, { minimumFractionDigits: 2, maximumFractionDigits: 2 });

        // ==========================================
        // 2. GESTIÓN DE SEGURIDAD Y PRECIOS
        // ==========================================
        function verificarAcceso() {
            const intento = prompt("Acceso Administrativo. Ingrese clave:");
            if (intento === CLAVE_MAESTRA) {
                document.getElementById('settings-panel').classList.remove('hidden');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } else if (intento !== null) alert("Clave incorrecta. Intente de nuevo.");
        }

        function cerrarAjustes() { document.getElementById('settings-panel').classList.add('hidden'); }

        function loadPrices() {
            const stored = localStorage.getItem('precios_campesino');
            preciosActuales = stored ? JSON.parse(stored) : {...preciosBase};
            renderPricesEditor();
        }

        function renderPricesEditor() {
            const container = document.getElementById('prices-editor');
            container.innerHTML = '';
            for (const [nombre, precio] of Object.entries(preciosActuales)) {
                container.innerHTML += `
                    <div class="flex items-center justify-between gap-2 bg-white p-2 rounded-lg border border-gray-100">
                        <span class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">${nombre}</span>
                        <input type="number" step="0.000001" value="${precio}" data-ing="${nombre}" 
                            class="price-input w-24 text-right text-xs font-mono bg-orange-50 p-1 rounded border border-orange-100 outline-none font-bold text-gray-800">
                    </div>`;
            }
        }

        function savePrices() {
            document.querySelectorAll('.price-input').forEach(input => {
                preciosActuales[input.getAttribute('data-ing')] = parseFloat(input.value);
            });
            localStorage.setItem('precios_campesino', JSON.stringify(preciosActuales));
            showToast("BASE DE COSTOS ACTUALIZADA");
            cerrarAjustes();
            calcular();
        }

        // ==========================================
        // 3. LÓGICA DE CÁLCULO (ESCALADO)
        // ==========================================
        function calcular() {
            const inputCount = document.getElementById('cantidadPanes');
            let count = parseInt(inputCount.value);
            
            // Validación mínima
            if (!count || count < 1) { count = 1; inputCount.value = 1; }

            // 1. Calcular el peso total de masa que necesitamos
            const pesoMasaTotalDeseada = count * MASA_PAN_ESTANDAR;

            // 2. Calcular la harina base necesaria
            // Suma de porcentajes es 175%
            const pesoHarinaNecesaria = pesoMasaTotalDeseada / (recetaBase.reduce((a, b) => a + b.porcentaje, 0) / 100);

            const tbody = document.getElementById('tabla-body');
            tbody.innerHTML = '';
            let costoTotalInsumos = 0;

            // 3. Calcular peso de cada ingrediente y su costo
            recetaBase.forEach(ing => {
                const gramos = (pesoHarinaNecesaria * ing.porcentaje) / 100;
                const costo = gramos * (preciosActuales[ing.nombre] || 0);
                costoTotalInsumos += costo;

                // Formatear pesos con punto para miles
                const gFormateado = fmtPeso.format(Math.round(gramos));
                
                // Formatear costos con coma para decimales
                const cFormateado = fmtCosto.format(costo);

                tbody.innerHTML += `
                    <tr>
                        <td class="px-1 py-3 font-semibold text-gray-700 text-xs">${ing.nombre}</td>
                        <td class="px-1 py-3 text-right font-bold text-gray-800 no-wrap text-sm">${gFormateado} g</td>
                        <td class="px-1 py-3 text-right text-gray-400 font-mono text-[11px] no-wrap border-l border-gray-50/50">$ ${cFormateado}</td>
                    </tr>`;
            });

            // 4. Actualizar Totales en interfaz
            document.getElementById('total-gramos').innerText = fmtPeso.format(Math.round(pesoMasaTotalDeseada)) + ' g';
            document.getElementById('total-costo').innerText = '$ ' + fmtCosto.format(costoTotalInsumos);
        }

        // ==========================================
        // 4. UTILIDADES
        // ==========================================
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg; toast.style.opacity = '1';
            setTimeout(() => toast.style.opacity = '0', 2000);
        }

        async function copyToClipboard() {
            const panes = document.getElementById('cantidadPanes').value;
            const masaTotal = document.getElementById('total-gramos').innerText;
            const costoTotal = document.getElementById('total-costo').innerText;
            
            let text = `📋 PAN CAMPESINO - Resumen de Producción\n`;
            text += `Unidades: ${panes}\n`;
            text += `Costo Insumos: ${costoTotal}\n`;
            text += `Masa Total a Preparar: ${masaTotal}\n`;
            text += `---\n`;
            text += `Ingredientes Necesarios:\n`;
            
            document.querySelectorAll('#tabla-body tr').forEach(tr => {
                const ingrediente = tr.cells[0].innerText;
                const peso = tr.cells[1].innerText;
                text += `- ${ingrediente.padEnd(12)}: ${peso}\n`;
            });
            text += `------------------------------\n`;
            text += `Gestión Fernando Araujo`;

            try {
                await navigator.clipboard.writeText(text);
                showToast("LISTA COPIADA PARA WHATSAPP");
            } catch (err) { console.error('Error al copiar', err); }
        }

        window.onload = () => { loadPrices(); calcular(); };
    </script>
</body>
</html>
