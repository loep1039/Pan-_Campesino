<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Pan Campesino | Gestión de Producción</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --color-primary: #008f53;
            --color-primary-dark: #00693e;
            --color-primary-light: #e8f5e9;
            --text-dark: #1e2a3a;
            --text-muted: #64748b;
            --bg-light: #f8fafc;
            --white: #ffffff;
            --border-light: #e2e8f0;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
            background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Contenedor principal estilo card */
        .product-card {
            width: 100%;
            max-width: 420px;
            background: var(--white);
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.25);
            transition: transform 0.3s ease;
        }

        /* Header con gradiente profesional */
        .product-header {
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-dark) 100%);
            padding: 24px 20px;
            text-align: center;
            position: relative;
        }

        .product-header h1 {
            color: var(--white);
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            margin-bottom: 6px;
        }

        .product-header p {
            color: rgba(255, 255, 255, 0.85);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 500;
        }

        /* Botón de retorno elegante */
        .back-button {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(8px);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .back-button i {
            color: white;
            font-size: 1.1rem;
        }

        .back-button:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-50%) scale(1.05);
        }

        /* Panel de resumen */
        .summary-panel {
            padding: 20px;
            background: var(--bg-light);
            border-bottom: 1px solid var(--border-light);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }

        .stat-card {
            background: var(--white);
            border-radius: 20px;
            padding: 14px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02);
            border: 1px solid var(--border-light);
        }

        .stat-card.full-width {
            grid-column: 1 / -1;
        }

        .stat-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-dark);
        }

        .stat-value.cost {
            color: var(--color-primary);
        }

        /* Control de cantidad */
        .quantity-control {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 4px;
        }

        .qty-input {
            width: 70px;
            border: 1px solid var(--border-light);
            border-radius: 40px;
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-dark);
            text-align: center;
            padding: 8px 0;
            outline: none;
            background: var(--white);
        }

        .qty-input:focus {
            border-color: var(--color-primary);
            box-shadow: 0 0 0 2px rgba(0, 143, 83, 0.1);
        }

        .unit-text {
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.9rem;
        }

        /* Lista de ingredientes */
        .ingredients-list {
            padding: 8px 20px 20px;
            background: var(--white);
        }

        .section-title {
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border-light);
        }

        .ingredient-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid var(--border-light);
        }

        .ingredient-item:last-child {
            border-bottom: none;
        }

        .ingredient-name {
            font-weight: 600;
            color: var(--text-dark);
            font-size: 0.95rem;
        }

        .ingredient-percent {
            font-size: 0.7rem;
            color: var(--text-muted);
            font-weight: normal;
            margin-left: 4px;
        }

        .ingredient-details {
            text-align: right;
        }

        .ingredient-quantity {
            font-weight: 700;
            font-size: 0.9rem;
            color: var(--text-dark);
        }

        .ingredient-price {
            font-size: 0.7rem;
            color: var(--color-primary);
            font-weight: 600;
            margin-top: 2px;
        }

        /* Botón de acción */
        .action-button {
            margin: 8px 20px 24px;
        }

        .btn-copy {
            width: 100%;
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-dark) 100%);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 48px;
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(0, 143, 83, 0.25);
        }

        .btn-copy:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 143, 83, 0.3);
        }

        .btn-copy:active {
            transform: translateY(1px);
        }

        .copy-message {
            text-align: center;
            font-size: 0.7rem;
            color: var(--color-primary);
            margin-top: 10px;
            display: none;
        }

        /* Footer */
        .footer-brand {
            text-align: center;
            padding: 16px 20px;
            background: var(--bg-light);
            border-top: 1px solid var(--border-light);
        }

        .footer-brand span {
            font-size: 0.7rem;
            color: var(--text-muted);
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="product-card">
    <!-- Header con botón de retorno -->
    <div class="product-header">
        <a href="https://loep1039.github.io/Menu_Panaderia/" class="back-button">
            <i class="fas fa-arrow-left"></i>
        </a>
        <h1>PAN CAMPESINO</h1>
        <p>Sistema de gestión · Fernando Araujo</p>
    </div>

    <!-- Panel de resumen -->
    <div class="summary-panel">
        <div class="stats-grid">
            <div class="stat-card full-width">
                <div class="stat-label">Cantidad de panes</div>
                <div class="quantity-control">
                    <input type="number" id="inputPanes" class="qty-input" value="1" min="1" step="1">
                    <span class="unit-text">unidades</span>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Costo insumos</div>
                <div class="stat-value cost" id="resCosto">$ 0.00</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Masa total</div>
                <div class="stat-value" id="resMasa">0 g</div>
            </div>
        </div>
    </div>

    <!-- Lista de ingredientes -->
    <div class="ingredients-list">
        <div class="section-title">
            <i class="fas fa-flour" style="margin-right: 6px;"></i> Ingredientes
        </div>
        <div id="listaIngredientes"></div>
    </div>

    <!-- Botón de acción -->
    <div class="action-button">
        <button class="btn-copy" onclick="copiarAlPortapapeles()">
            <i class="fas fa-copy"></i> Copiar lista de insumos
        </button>
        <div id="copyMessage" class="copy-message">
            <i class="fas fa-check-circle"></i> ¡Lista copiada al portapapeles!
        </div>
    </div>

    <!-- Footer -->
    <div class="footer-brand">
        <span>📊 Gestión profesional de panadería</span>
    </div>
</div>

<script>
    const WEB_APP_URL = "https://gist.githubusercontent.com/loep1039/0b9fbae05f40bcd16a9a883c5ef0b999/raw/precios.json";

    const RECETA = {
        nombre: "Pan Campesino",
        harinaPorUnidad: 230.0,
        items: [
            { nombre: "Harina", pct: 100.0, precioKg: 0 },
            { nombre: "Agua", pct: 54.5, precioKg: 0 },
            { nombre: "Levadura", pct: 1.7, precioKg: 0 },
            { nombre: "Sal", pct: 2.0, precioKg: 0 },
            { nombre: "Azúcar", pct: 8.0, precioKg: 0 },
            { nombre: "Margarina", pct: 8.0, precioKg: 0 },
            { nombre: "Vainilla", pct: 0.8, precioKg: 0 }
        ]
    };

    let preciosCargados = false;

    async function sincronizarPrecios() {
        try {
            const response = await fetch(WEB_APP_URL);
            const data = await response.json();
            
            RECETA.items.forEach(ing => {
                const encontrado = data.find(p => p.nombre.toLowerCase().trim() === ing.nombre.toLowerCase());
                if (encontrado) {
                    ing.precioKg = encontrado.precioKg;
                }
            });
            preciosCargados = true;
            calcular(); 
        } catch (error) {
            console.error("Error al cargar precios:", error);
            calcular();
        }
    }

    function calcular() {
        const panes = parseFloat(document.getElementById('inputPanes').value) || 0;
        const contenedor = document.getElementById('listaIngredientes');
        contenedor.innerHTML = '';

        let masaTotal = 0;
        let costoTotal = 0;

        RECETA.items.forEach(ing => {
            const gramos = (RECETA.harinaPorUnidad * panes) * (ing.pct / 100);
            const costo = (gramos / 1000) * ing.precioKg;

            masaTotal += gramos;
            costoTotal += costo;

            contenedor.innerHTML += `
                <div class="ingredient-item">
                    <div>
                        <span class="ingredient-name">${ing.nombre}</span>
                        <span class="ingredient-percent">(${ing.pct}%)</span>
                    </div>
                    <div class="ingredient-details">
                        <div class="ingredient-quantity">${gramos.toFixed(1)} g</div>
                        <div class="ingredient-price">$ ${costo.toFixed(3)}</div>
                    </div>
                </div>
            `;
        });

        document.getElementById('resMasa').innerText = `${masaTotal.toFixed(0)} g`;
        document.getElementById('resCosto').innerText = `$ ${costoTotal.toFixed(2)}`;
    }

    function copiarAlPortapapeles() {
        const panes = document.getElementById('inputPanes').value;
        const masaTotalStr = document.getElementById('resMasa').innerText;
        const costoTotalStr = document.getElementById('resCosto').innerText;

        let textoCopiar = `🍞 ${RECETA.nombre.toUpperCase()}\n`;
        textoCopiar += `━━━━━━━━━━━━━━━━━━━━\n`;
        textoCopiar += `📊 Cantidad: ${panes} unidad(es)\n`;
        textoCopiar += `💰 Costo insumos: ${costoTotalStr}\n`;
        textoCopiar += `⚖️ Masa total: ${masaTotalStr}\n`;
        textoCopiar += `━━━━━━━━━━━━━━━━━━━━\n`;
        textoCopiar += `📋 LISTA DE INSUMOS:\n\n`;

        RECETA.items.forEach(ing => {
            const gramos = (RECETA.harinaPorUnidad * panes) * (ing.pct / 100);
            textoCopiar += `• ${ing.nombre}: ${gramos.toFixed(1)} g\n`;
        });

        textoCopiar += `\n━━━━━━━━━━━━━━━━━━━━\n`;
        textoCopiar += `Sistema de Gestión - Fernando Araujo`;

        navigator.clipboard.writeText(textoCopiar).then(() => {
            const messageEl = document.getElementById('copyMessage');
            messageEl.style.display = 'block';
            setTimeout(() => {
                messageEl.style.display = 'none';
            }, 2000);
        });
    }

    document.getElementById('inputPanes').addEventListener('input', calcular);
    window.onload = sincronizarPrecios;
</script>

</body>
</html>
